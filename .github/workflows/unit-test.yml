name: UnitTests

on:
  push:
  pull_request:
    branches: [ main,develop ]
  workflow_dispatch:

jobs:
  unit-test:
    name: PHP ${{ matrix.php }} – ${{ matrix.dependency-version }}
    runs-on: ubuntu-24.04

    concurrency:
      group: unit-test-${{ github.ref }}-${{ matrix.php }}
      cancel-in-progress: true

    strategy:
      fail-fast: false
      matrix:
        php:
          - '8.4'
        dependency-version:
          - prefer-stable

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo, pdo_sqlite, sqlite3
          coverage: xdebug
          tools: composer:v2

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-php${{ matrix.php }}-${{ matrix.dependency-version }}-${{ hashFiles('**/composer.json') }}
          restore-keys: |
            composer-php${{ matrix.php }}-${{ matrix.dependency-version }}-
            composer-php${{ matrix.php }}-

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Run tests (no coverage)
        run: composer test

      - name: Run tests with coverage
        run: composer test:coverage

      - name: Check coverage threshold (≥75%)
        run: |
          pct=$(grep -oP 'coveredelements="\K[0-9.]+' coverage/clover.xml)
          total=$(grep -oP 'elements="\K[0-9.]+' coverage/clover.xml | head -1)
          coverage=$(awk "BEGIN {printf \"%.2f\", ($pct/$total)*100}")
          echo "Code coverage: ${coverage}%"
          if (( $(echo "$coverage < 75" | bc -l) )); then
            echo "::error::Coverage ${coverage}% is below the required 75% threshold."
            exit 1
          fi

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-php-${{ matrix.php }}
          path: coverage/
